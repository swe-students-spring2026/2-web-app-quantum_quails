{% extends "base.html" %}

{% block title %}Edit {{ item.repo_name }} - Open Sorcerer{% endblock %}

{% block content %}

<a href="{{ url_for('details', id=item._id) }}" class="flex items-center gap-1 text-sm text-gh-muted mb-4">
    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/>
    </svg>
    Back
</a>

<h1 class="text-lg font-semibold text-white mb-4">Edit Repository</h1>

<form method="POST" action="{{ url_for('edit', id=item._id) }}" class="bg-gh-surface rounded-lg border border-gh-border p-4">
    <div class="mb-4">
        <label class="block text-sm text-gh-muted mb-1">Repository Name</label>
        <input
            type="text"
            name="name"
            value="{{ item.repo_name }}"
            class="w-full bg-gh-canvas border border-gh-border rounded-md px-3 py-2 text-sm text-gh-text focus:outline-none focus:border-gh-link"
        >
    </div>
    <button type="submit" class="w-full py-2 text-sm bg-gh-green text-white rounded-md">Save Changes</button>
</form>

{% endblock %}
