{% extends "base.html" %}

{% block title %}Open Sorcerer{% endblock %}

{% block content %}
<h1 class="text-lg font-semibold text-white mb-4">Login</h1>

<div class="bg-gh-surface rounded-lg border border-gh-border p-4">
    <form method="POST" class="space-y-4">
        <div>
            <label class="block text-sm font-medium text-gh-text mb-1">Username</label>
            <input type="text" name="username" required placeholder="Enter your username"
                   class="w-full bg-gh-canvas border border-gh-border rounded-md px-3 py-2 text-sm text-gh-text placeholder-gh-muted focus:outline-none focus:border-gh-link focus:ring-1 focus:ring-gh-link">
        </div>

        <div>
            <label class="block text-sm font-medium text-gh-text mb-1">Password</label>
            <input type="password" name="password" required placeholder="Enter your password"
                   class="w-full bg-gh-canvas border border-gh-border rounded-md px-3 py-2 text-sm text-gh-text placeholder-gh-muted focus:outline-none focus:border-gh-link focus:ring-1 focus:ring-gh-link">
        </div>

        <button type="submit" class="w-full bg-gh-green text-white px-4 py-2 rounded-md text-sm font-medium hover:bg-[#2ea043] transition-colors">
            Login
        </button>
    </form>
</div>

<p class="mt-4 text-sm text-gh-muted text-center">
    Don't have an account? <a href="{{ url_for('register') }}" class="text-gh-link hover:underline">Register here</a>
</p>
{% endblock %}
