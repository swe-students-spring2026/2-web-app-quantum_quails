{% extends "base.html" %}

{% block title %}Open Sorcerer{% endblock %}

{% block content %}
<h1 class="text-lg font-semibold text-white mb-4">Add Repository</h1>

<div class="bg-gh-surface rounded-lg border border-gh-border p-4">
    <form method="POST" class="space-y-4">
        <div>
            <label class="block text-sm font-medium text-gh-text mb-1">GitHub Repository URL</label>
            <input type="text" name="repo_url" placeholder="https://github.com/user/repo" required 
                   class="w-full bg-gh-canvas border border-gh-border rounded-md px-3 py-2 text-sm text-gh-text placeholder-gh-muted focus:outline-none focus:border-gh-link focus:ring-1 focus:ring-gh-link">
        </div>
        
        <button type="submit" class="w-full bg-gh-green text-white px-4 py-2 rounded-md text-sm font-medium hover:bg-[#2ea043] transition-colors">
            Analyze & Add
        </button>
    </form>
</div>
<script>
    document.querySelector('form').addEventListener('submit', e => {
        if (!document.querySelector('input[name="repo_url"]').value.includes('github.com')) {
            e.preventDefault(); alert('Please enter a valid GitHub URL!');
        }
    });
</script>
{% endblock %}
